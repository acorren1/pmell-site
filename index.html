<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocono Mountain East Little League</title>
  <meta name="description" content="Pocono Mountain East Little League information hub for registration, schedules, volunteers, field locations, sponsors, and league updates." />

  <style>
    :root {
      --red: #b3262a;
      --red-dark: #8f1e22;
      --black: #090909;
      --charcoal: #18191d;
      --ink: #111318;
      --gray: #667085;
      --light: #f7f5f1;
      --cream: #fffdf8;
      --white: #ffffff;
      --border: #e7e1d8;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.11);
      --soft-shadow: 0 10px 30px rgba(0, 0, 0, 0.07);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--light);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .top-bar {
      background: var(--black);
      color: var(--white);
      font-size: 0.86rem;
      padding: 8px 0;
    }

    .top-bar .container {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
    }

    .top-links {
      display: flex;
      gap: 18px;
      align-items: center;
      opacity: 0.94;
      font-weight: 700;
    }

    .site-header {
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
    }

    .nav-wrap {
      min-height: 112px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 138px;
      height: 138px;
      object-fit: contain;
      margin: -16px 0;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 0.84rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .nav a {
      position: relative;
      padding: 10px 0;
      white-space: nowrap;
    }

    .nav a:hover,
    .nav a.active {
      color: var(--red);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 3px;
      background: var(--red);
      border-radius: 99px;
    }

    .mobile-menu-button {
      display: none;
      background: var(--black);
      color: var(--white);
      border: 0;
      border-radius: 8px;
      padding: 11px 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 9px;
      padding: 14px 22px;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.86rem;
      border: 2px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease;
      cursor: pointer;
      line-height: 1;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,.18);
    }

    .btn-red {
      background: var(--red);
      color: var(--white);
    }

    .btn-red:hover {
      background: var(--red-dark);
    }

    .btn-outline {
      background: var(--white);
      border-color: var(--black);
      color: var(--black);
    }

    .btn-outline:hover {
      background: var(--black);
      color: var(--white);
    }

    .hero {
      background: var(--cream);
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 35%, rgba(179, 38, 42, 0.08), transparent 26%),
        radial-gradient(circle at 7% 78%, rgba(0, 0, 0, 0.05), transparent 24%);
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      min-height: 585px;
      align-items: stretch;
      position: relative;
      z-index: 1;
    }

    .hero-copy {
      position: relative;
      padding: 82px 54px 82px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
    }

    .hero-copy::before {
      content: "";
      position: absolute;
      inset: 0 -92px 0 -500px;
      background: rgba(255, 253, 248, 0.94);
      clip-path: polygon(0 0, 84% 0, 100% 100%, 0% 100%);
      z-index: -1;
    }

    .eyebrow {
      color: var(--red);
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }

    h1, h2, h3 {
      line-height: 1.05;
      text-transform: uppercase;
    }

    h1 {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: clamp(3rem, 5.15vw, 5.15rem);
      letter-spacing: 0.025em;
      margin-bottom: 22px;
    }

    h1 span {
      color: var(--red);
      display: block;
    }

    .hero-copy p:not(.eyebrow) {
      font-size: 1.1rem;
      max-width: 510px;
      color: #30343a;
      margin-bottom: 28px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .hero-image {
      min-height: 585px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.06), rgba(0,0,0,.02)),
        url('images/pmell-hero.jpg') center/cover no-repeat;
      position: relative;
    }

    .hero-badge {
      position: absolute;
      right: 24px;
      bottom: 24px;
      background: rgba(9,9,9,.82);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .78rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .alert-strip {
      background: linear-gradient(90deg, var(--red-dark), var(--red));
      color: var(--white);
      padding: 18px 0;
      font-weight: 900;
      text-transform: uppercase;
    }

    .alert-strip .container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 26px;
      text-align: center;
    }

    .section {
      padding: 62px 0;
    }

    .section-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .section-title h2,
    .split-copy h2,
    .sponsor-copy h2 {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: clamp(2rem, 3vw, 3.2rem);
      letter-spacing: 0.03em;
      margin-bottom: 14px;
    }

    .section-title p {
      color: var(--gray);
      max-width: 640px;
      margin: 0 auto;
    }

    .rule {
      width: 80px;
      height: 4px;
      background: var(--red);
      border-radius: 99px;
      margin: 16px auto 0;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
    }

    .quick-card {
      padding: 32px 22px;
      text-align: center;
      border-right: 1px solid var(--border);
      transition: transform .18s ease, background .18s ease;
    }

    .quick-card:hover {
      background: #fffaf3;
      transform: translateY(-2px);
    }

    .quick-card:last-child {
      border-right: 0;
    }

    .icon-circle {
      width: 58px;
      height: 58px;
      border: 2px solid var(--black);
      border-radius: 18px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      color: var(--red);
      font-size: 1.35rem;
      font-weight: 900;
      background: #fff;
    }

    .quick-card h3 {
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .quick-card p {
      color: var(--gray);
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .text-link {
      color: var(--red);
      font-weight: 900;
      font-size: 0.9rem;
    }

    .split-card {
      display: grid;
      grid-template-columns: 0.82fr 1.18fr;
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .split-copy {
      padding: 54px 46px;
      position: relative;
      overflow: hidden;
    }

    .split-copy::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -40px;
      width: 230px;
      height: 150px;
      background: rgba(179,38,42,.08);
      clip-path: polygon(50% 0%, 100% 100%, 0 100%);
    }

    .split-copy p {
      color: #333842;
      margin-bottom: 26px;
      max-width: 520px;
    }

    .split-image {
      min-height: 330px;
      background: url('images/pmell-field.jpg') center/cover no-repeat;
      position: relative;
    }

    .field-ribbon {
      position: absolute;
      left: 26px;
      bottom: 26px;
      background: rgba(9,9,9,.82);
      color: #fff;
      padding: 12px 15px;
